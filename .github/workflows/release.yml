name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to build (e.g. v0.1.0). Empty = use Cargo.toml version."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: scrutiny-aarch64-apple-darwin
          # Intel macOS dropped: macos-13 retired; macos-15-intel dies ~2027.
          # Intel Macs: ensure-bin falls back to cargo build --release.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: scrutiny-x86_64-unknown-linux-gnu
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: scrutiny-aarch64-unknown-linux-gnu
            cross: true
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            artifact: scrutiny-x86_64-pc-windows-msvc.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (linux aarch64)
        if: matrix.cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: matrix.cross != true
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Stage artifact (unix)
        if: runner.os != 'Windows'
        run: |
          src="target/${{ matrix.target }}/release/scrutiny"
          cp "$src" "${{ matrix.artifact }}"
          chmod +x "${{ matrix.artifact }}"

      - name: Stage artifact (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/scrutiny.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            VER=$(awk '/^\[workspace\.package\]/{p=1;next} /^\[/{p=0} p&&/^version/{gsub(/"/,"",$3);print $3;exit}' Cargo.toml)
            TAG="v${VER}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Using tag ${TAG}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts
        run: |
          mkdir -p release-assets
          find dist -type f -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Scrutiny ${{ steps.meta.outputs.tag }}
          draft: false
          generate_release_notes: true
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
