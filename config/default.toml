default_client = "claude"
# Run spawned agents headless (stdout captured). Set false to open each agent
# in a visible terminal window in auto mode (claude only; tmux/zellij/
# macOS Terminal/iTerm2). Applies to parley, probe, and forge.
# Unsupported surfaces or non-claude clients fall back to headless.
headless = true
# When set, skip client prompt for `scrutiny probe` (must be installed on PATH).
# force_client = "claude"
# When set, skip spawn-mode prompt. Default when unset: isolated.
# force_spawn_mode = "isolated"
# Editor for PR descriptions (forge + `scrutiny pr`). Supports args, e.g. "code --wait".
# Falls back to $VISUAL, then $EDITOR, then vi.
# editor = "vi"

[models.cursor]
xs = "composer-2-fast"
s = "composer-2-fast"
m = "claude-4.6-sonnet-medium-thinking"
l = "claude-sonnet-5-thinking-high"
xl = "claude-opus-4-8-thinking-high"

# Claude Code: use aliases or pinned Anthropic ids only (not Cursor slugs).
[models.claude]
xs = "haiku"
s = "haiku"
m = "sonnet"
l = "opus"
xl = "opus"

[models.codex]
xs = "gpt-5.3-codex"
s = "gpt-5.3-codex"
m = "gpt-5.5-medium"
l = "gpt-5.6-sol-medium"
xl = "gpt-5.6-terra-medium"

[review.security_by_tier]
XS = false
S = false
M = true
L = true
XL = true

[review.performance_by_tier]
XS = false
S = false
M = false
L = true
XL = true

[review.error_handling_by_tier]
XS = false
S = true
M = true
L = true
XL = true

[review.signals]
ignore_content_signals = false
security_path_globs = [
  "**/auth/**", "**/*auth*", "**/*oauth*", "**/*session*",
  "**/permission*/**", "**/*permission*", "**/*rbac*", "**/*acl*",
  "**/security/**", "**/*crypto*", "**/*secret*", "**/*credential*",
  "**/payment*/**", "**/*billing*", "**/*checkout*",
  "**/middleware/**", "**/api/**", "**/server/**", "**/backend/**",
  "**/.env*", "**/secrets/**",
]
security_diff_patterns = [
  '(?i)\b(fetch|axios|XMLHttpRequest|got\(|node-fetch|reqwest|ureq|httpx|RestClient|HttpClient)\b',
  '(?i)\b(WebSocket|EventSource|graphql|apollo|trpc)\b',
  '(?i)\b(Authorization|Bearer\s+|JWT|csrf|xsrf|Set-Cookie|document\.cookie)\b',
  '(?i)\b(localStorage|sessionStorage|indexedDB)\.(get|set|remove)Item',
  '(?i)\b(password|passwd|api[_-]?key|private[_-]?key|client[_-]?secret)\b',
  '(?i)dangerouslySetInnerHTML|innerHTML\s*=|outerHTML\s*=',
  '(?i)\beval\s*\(|new\s+Function\s*\(',
  '(?i)\bexec\s*\(|child_process|Command::new|std::process::Command',
  '(?i)\b(Access-Control-Allow-Origin|\bcors\b|window\.location)',
]
performance_path_globs = [
  "**/hooks/**", "**/domain/**", "**/stores/**", "**/data/**",
  "**/workers/**", "**/wasm/**", "**/native/**",
  "**/*List*", "**/*Table*", "**/*Grid*", "**/*Virtual*",
]
performance_diff_patterns = [
  '(?i)\b(useEffect|useLayoutEffect|useMemo|useCallback|useTransition|startTransition)\s*\(',
  '(?i)\b(React\.memo|memo\s*\()',
  '(?i)\.map\s*\(|\.filter\s*\(|\.reduce\s*\(|\.flatMap\s*\(',
  '(?i)\bfor\s*\(|\bwhile\s*\(|\.forEach\s*\(',
  '(?i)requestAnimationFrame|getBoundingClientRect|offsetWidth|offsetHeight|scrollTop',
  '(?i)\b(will-change|contain:|content-visibility:)',
  '(?i)\.clone\s*\(|to_vec\s*\(|collect::<Vec',
  '(?i)\bMutex::|\bRwLock::|blocking_',
]
performance_css_path_globs = ["**/*.css", "**/*.scss", "**/*.sass", "**/*.less"]
performance_css_patterns = [
  '(?i):(nth-child|nth-of-type|has)\s*\(',
  '(?i)@keyframes|\banimation:',
  '(?i)[*]\s*[>+~]|[>+~]\s*[*]',
  '(?i)\bfilter:|\bbackdrop-filter:',
]
error_handling_diff_patterns = [
  '(?i)\btry\s*\{|\bcatch\s*\(|\.catch\s*\(|finally\s*\{',
  '(?i)\basync\s+function|\basync\s*\(|await\s+',
  '(?i)\bResult<|anyhow::|thiserror|Promise\.reject',
  '(?i)\.unwrap\s*\(|\.expect\s*\(|panic!',
  '(?i)\b(onError|errorBoundary|ErrorBoundary|toast\.error)\b',
]

[agents]
max_agents_total = 4
max_reviewers = 2
max_evangelists = 1

[agents.reviewers_by_tier]
XS = 0
S = 1
M = 1
L = 2
XL = 2

[agents.evangelists_by_tier]
XS = 0
S = 0
M = 0
L = 1
XL = 1

[pack]
max_chars = 48000
doc_digest_lines = 40
symbol_context_lines = 3
min_file_chars = 1200
source_weight = 4
test_weight = 2
doc_weight = 1
enable_xref = true
xref_max_symbols = 40
xref_max_files_scanned = 300
xref_char_budget = 6000
xref_body_lines = 40
annex_char_budget = 12000

[pack.explore]
enable = true
max_extra_reads = 6
max_extra_chars = 24000
prefer_read_over_bash = true
allow_repo_grep = false
require_pack_path_hint = true

[scan]
enable = true
# commands = []  # optional project lint hooks, run in repo cwd

[scan.i18n]
enable = true
reference_locale = "en"
path_globs = [
  "**/i18n/locales/*.json",
  "**/locales/*.json",
  "**/locale/*.json",
  "**/lang/*.json",
  "**/translations/*.json",
]
check_placeholders = true
check_empty_values = true
full_catalog = false

[forge]
enable_figma = true
enable_lore = true
enable_ticket_writeback = true
enable_po = true

default_approach = "tdd"
default_agents = 2
default_testers = 1
default_reviewers = 1
default_evangelists = 0

verify_max_loops = 2
verify_coverage = true

enable_branch = true
branch_headless = "auto"

# Optional. When set, a dedicated headless agent writes the PR description from
# this prompt + the diff (overrides the implement agent's pr_body). Leave unset
# to keep the default deterministic body.
# pr_description_prompt = "Summarize for reviewers in structured Markdown (## sections, paragraphs, bullet lists, bold): what changed, why, risk, test notes."

[forge.complexity]
# Jira field names that hold story-point estimates (tried in order).
story_point_fields = ["story_points", "customfield_10016", "customfield_10028", "customfield_10034"]
# Keywords suggesting broad, cross-cutting scope (+8 pts each, capped at 2 hits).
breadth_keywords = ["refactor", "migrate", "rewrite", "redesign", "architecture", "overhaul", "restructure", "across"]
# Keywords suggesting external/API integration work (+6 pts each, capped at 2 hits).
integration_keywords = ["api", "endpoint", "webhook", "schema", "database", "migration", "third-party", "external", "integration"]
# Keywords suggesting security-sensitive changes (+10 pts each, capped at 2 hits).
risk_keywords = ["auth", "security", "payment", "permission", "encryption", "pii", "credential", "oauth", "token"]
# Keywords indicating trivial changes (-8 pts each, capped at 2 hits).
trivial_keywords = ["typo", "copy", "wording", "rename", "bump", "documentation", "translation", "minor", "spelling"]
# Label substrings that bump complexity up (+6 pts, max 1).
bump_labels = ["urgent", "complex", "breaking-change", "breaking", "epic", "large"]
# Label substrings that pull complexity down (-6 pts, max 1).
lower_labels = ["trivial", "minor", "quick", "simple", "easy", "small"]
# Tier thresholds [XS_max, S_max, M_max, L_max]; above L_max → XL.
tier_thresholds = [18, 35, 55, 95]

[parley]
default_members = 1
default_evangelists = 1
# Verifiers check that fixes actually address comments (runs before evangelist).
default_verifiers = 1
push_fix_max_loops = 2

[git]
base_candidates = ["main", "master", "develop"]
exclude_globs = [
  "**/package-lock.json",
  "**/*.lock",
  "**/node_modules/**",
  "**/*.snap",
  "**/dist/**",
  "**/*.min.js",
  "**/*.map",
  "**/generated/**",
  "**/*.pb.go",
  "**/*.pb.ts",
]

# Custom prompt injection. Text here is prepended to spawned-agent prompts.
# Order: global → per-agent → scrutiny's own prompt.
# Per-agent key = the agent's label prefix with "-" replaced by "_".
# Unknown keys are ignored. Team leads only inject into their own prompt, not
# into teammates they spawn themselves. Uncomment to enable.
# [prompts]
# Prepended to EVERY spawned agent (probe, parley, forge).
# global = "Follow our house rules: cite file:line; never touch generated code."
#
# Per-role overrides (prepended after `global`, before scrutiny's prompt).
# [prompts.agents]
# --- probe (code review) ---
# reviewer = ""
# evangelist = ""
# security = ""
# performance = ""
# error_handling = ""
# lead = ""                 # team-mode review lead
# --- parley (PR comment resolution) ---
# parley_member = ""
# parley_lead = ""
# parley_verifier = ""
# parley_evangelist = ""
# parley_push_fix = ""
# --- forge (ticket implementation) ---
# forge_test_plan = ""
# forge_test_plan_revise = ""
# forge_implement = ""       # single-agent implement
# forge_po_team = ""         # team-mode PO/lead implement
# forge_verify_fix = ""
